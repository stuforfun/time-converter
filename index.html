<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">

<title>Time Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8; --bg2:#e4dcd0; --wh:#ffffff;
  --ink:#1a1510; --ink2:#3a4560; --ink3:#6b5f4e; --ink4:#9e8f7a;
  --blue:#1a3a5c; --blue2:#2a5480; --bluebg:#d6e4f0; --bluebdr:#7a9abf;
  --red:#7a1c1c; --redbdr:#c08090; --redbg:#fff8f8; --redtxt:#b07080;
  --bdr:#c8b99a; --bdr2:#dfd3be; --outbg:#fdfbf7;
  --err:#8b1a1a; --errbg:#fdf0f0; --errbdr:#d98080;
  --warn:#7a5c10; --warnbg:#fdf8e8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;padding:36px 20px 80px;}
.wrap{max-width:1080px;margin:0 auto;}

/* ── HEADER ── */
header{text-align:center;margin-bottom:44px;}
.hline{height:1px;background:linear-gradient(90deg,transparent,var(--bdr),transparent);margin:10px 0;}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:400;letter-spacing:.04em;margin-bottom:4px;}
.sub{font-size:.6rem;letter-spacing:.28em;text-transform:uppercase;color:var(--ink4);}


/* ── LAYOUT ── */
.layout{display:flex;flex-direction:column;gap:24px;}
@media(min-width:740px){
  .layout{display:grid;grid-template-columns:1fr 1fr;align-items:start;gap:24px;}
}
.dest-col{display:flex;flex-direction:column;gap:10px;}
.origin-card{border:1.5px solid var(--bluebdr);box-shadow:3px 3px 0 var(--bg2);}

/* ── CARDS ── */
.origin-card,.dest-card{
  background:var(--wh);padding:22px 20px;position:relative;overflow:hidden;
}
.origin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);}
.dest-card{border:1.5px solid var(--redbdr);box-shadow:3px 3px 0 var(--bg2);}
.dest-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--red);}

/* card header row */
.card-actions{position:absolute;top:9px;right:10px;display:flex;gap:5px;align-items:center;}
.remove-btn{
  background:none;font-family:'DM Mono',monospace;
  font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;
  padding:8px 16px;cursor:pointer;transition:all .15s;
  border:1px solid var(--bdr2);color:var(--ink4);
  min-width:72px;min-height:36px;
}
.remove-btn:hover{border-color:var(--red);color:var(--red);}

.ptag{font-size:.57rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ink4);display:flex;align-items:center;gap:6px;margin-bottom:16px;}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pdot-blue{background:var(--blue);}
.pdot-red{background:var(--red);}

/* ── FIELDS ── */
.fld{margin-bottom:13px;}
.fld:last-child{margin-bottom:0;}
.flabel{display:block;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}



input[type=date],input[type=text],input[type=time]{
  width:100%;background:var(--bg);border:1.5px solid var(--bdr2);border-bottom:2px solid var(--bdr);
  color:var(--ink);font-family:'DM Mono',monospace;font-size:.88rem;
  padding:9px 10px;outline:none;border-radius:0;-webkit-appearance:none;appearance:none;
  transition:border-color .18s,background .18s;box-sizing:border-box;height:40px;
}
input:focus{border-color:var(--blue);background:var(--wh);}
input::placeholder{color:var(--ink4);font-size:.8rem;}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.3;cursor:pointer;}
/* hide browser's empty date edit field so placeholder text shows through */
input[type=date].empty:not(:focus)::-webkit-datetime-edit{ color:transparent; }
input.invalid,.outbox.invalid{border-color:var(--errbdr);background:var(--errbg);}
.err-msg{font-size:.6rem;color:var(--err);margin-top:4px;display:none;}
.err-msg.show{display:block;}

/* ── DATE + TIME + SET NOW grid ── */
.dt-setnow-grid{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;margin-bottom:13px;}
.dt-fields{min-width:0;}
.setnow-cell{display:flex;align-items:flex-start;padding-top:15px;}
.now-link{
  display:inline-flex;align-items:center;justify-content:center;
  background:none;border:1.5px solid var(--bdr);border-radius:0;
  font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--ink4);width:72px;height:108px;
  cursor:pointer;transition:border-color .15s,color .15s;
  box-sizing:border-box;text-align:center;line-height:1.6;
  word-break:break-word;padding:8px 4px;
}
.now-link:hover{border-color:var(--blue);color:var(--blue);}

/* shared time-input row inside destination cards */
.dt-row{display:grid;grid-template-columns:1fr auto;gap:10px;min-width:0;align-items:end;}
.dt-row>div{min-width:0;}
.dt-row input,.dt-row .outbox{min-width:0;width:100%;box-sizing:border-box;}
.now-cell{display:flex;align-items:flex-end;}

/* ── OUTPUT / DISPLAY BOXES — unified ── */
.outbox,
.date-display,
.time-display{
  background:var(--bg);border:1.5px solid var(--bdr2);border-bottom:2px solid var(--bdr);
  font-family:'DM Mono',monospace;font-size:.88rem;padding:9px 10px;
  height:40px;display:flex;align-items:center;color:var(--ink4);box-sizing:border-box;
}
/* has a real value */
.outbox.live,
.date-display.has-value,
.time-display.has-value{
  background:var(--outbg);color:var(--ink);
  border-color:var(--bdr2);border-bottom:2px solid var(--blue);
}
/* flash on update */
@keyframes flash{0%{background:var(--bluebg);}100%{background:var(--outbg);}}
.outbox.flash,
.date-display.flash,
.time-display.flash{animation:flash .35s ease;}

/* date-display is absolutely positioned inside date-wrap */
.date-wrap{position:relative;height:40px;}
.date-wrap input[type=date]{
  position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:2;opacity:0;cursor:pointer;box-sizing:border-box;
  background:transparent;border:none;pointer-events:none;
}
.date-wrap input[type=date].picking{
  opacity:1;pointer-events:auto;
  background:var(--wh);color:var(--ink);
  border:1.5px solid var(--blue);border-bottom:2px solid var(--blue);
  padding:9px 10px;font-family:'DM Mono',monospace;font-size:.88rem;
}
.date-display{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:1;
}
.date-wrap input[type=date].picking ~ .date-display{opacity:0;}

/* time-display is absolutely positioned inside time-wrap */
.time-wrap{position:relative;height:40px;}
.time-wrap input[type=time]{
  position:absolute;top:0;left:0;width:100%;height:100%;
  z-index:2;opacity:0;cursor:text;box-sizing:border-box;
  background:transparent;border:none;
}
.time-wrap input[type=time]:focus{
  opacity:1;z-index:3;
  background:var(--wh);color:var(--ink);
  border:1.5px solid var(--blue);border-bottom:2px solid var(--blue);
  padding:9px 10px;font-family:'DM Mono',monospace;font-size:.88rem;
}
.time-display{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:1;
}
.time-wrap:focus-within .time-display{opacity:0;}




/* ── DROPDOWN ── */
.cwrap{position:relative;}
.drop{display:none;position:absolute;top:calc(100% + 1px);left:0;right:0;z-index:9999;
  background:var(--wh);border:1.5px solid var(--bdr);max-height:200px;overflow-y:auto;
  box-shadow:0 8px 20px rgba(0,0,0,.1);}
.drop.open{display:block;}
.drow{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;
  cursor:pointer;font-size:.76rem;border-bottom:1px solid var(--bdr2);}
.drow:last-child{border-bottom:none;}
.drow:hover,.drow.hi{background:var(--bluebg);}
.dtz{font-size:.66rem;color:var(--ink4);}
.dhl{color:var(--blue);font-weight:600;}

/* ── FORMAT TOGGLE ── */
.tog{display:inline-flex;border:1.5px solid var(--bdr);overflow:hidden;height:40px;align-self:end;box-sizing:border-box;}
.tb{background:none;border:none;border-right:1.5px solid var(--bdr);
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;
  padding:0 11px;cursor:pointer;color:var(--ink4);transition:background .15s;}
.tb:last-child{border-right:none;}
.tb.on{background:var(--ink3);color:#fff;}
/* dest-card — override all blue interactive states to red */
.dest-card input[type=text]:focus{border-color:var(--red);}
.dest-card .drop{border-color:var(--redbdr);}
.dest-card .drow:hover,.dest-card .drow.hi{background:var(--redbg);}
.dest-card .dhl{color:var(--red);}
.dest-card .outbox.live,.dest-card .outbox.live-an{border-bottom-color:var(--red);}
.dest-card .outbox.flash{animation:flash-dest .35s ease;}

/* ── ADD SLOT ── */
.add-slot{border:1.5px dashed var(--bdr);background:transparent;padding:14px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.add-slot:hover{border-color:var(--blue2);background:var(--bluebg);}
.add-slot:hover .add-label{color:var(--blue2);}
.add-label{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink4);transition:color .2s;}

/* ── VALIDATION BANNER ── */
</style>
</head>

<header>

  </div>
  <h1>Time Converter</h1>

</header>

<div class="layout">

    <!-- ── ORIGIN ── -->

      <div class="fld">
        <label class="flabel" for="from-inp">City</label>
        <div class="cwrap">
          <input type="text" id="from-inp" placeholder="e.g. Tokyo, London, Dubai…" autocomplete="off"
            role="combobox" aria-autocomplete="list" aria-expanded="false"
            aria-controls="from-drop" aria-haspopup="listbox">
          <div class="drop" id="from-drop" role="listbox" aria-label="City suggestions"></div>
        </div>
        <div class="err-msg" id="err-city">Please select a city from the list.</div>
      </div>

      <div class="fld dt-setnow-grid">
        <div class="dt-fields">
          <div>
            <label class="flabel" for="in-date">Date</label>
            <div class="date-wrap">
              <div class="date-display outbox" id="date-display">e.g. Mar 1, 2026</div>
              <input type="date" id="in-date">
            </div>
            <div class="err-msg" id="err-date">Please enter a valid date.</div>
          </div>
          <div style="margin-top:13px;">
            <label class="flabel" for="in-time">Time</label>
            <div class="dt-row">
              <div class="time-wrap">
                <div class="time-display outbox" id="time-display">e.g. 09:00 AM</div>
                <input type="time" id="in-time" step="60" tabindex="0">
              </div>
              <div class="tog" role="group" aria-label="Origin time format">
                <button class="tb o-btn12" id="o-btn12" aria-pressed="false">12h</button>
                <button class="tb on o-btn24" id="o-btn24" aria-pressed="true">24h</button>
              </div>
            </div>
            <div class="err-msg" id="err-time">Please enter a time.</div>
          </div>
        </div>
        <div class="setnow-cell">
          <span class="now-link" id="now-btn">set now</span>
        </div>
      </div>

      <div class="fld">
        <label class="flabel">Timezone (UTC/GMT)</label>
        <div class="outbox" id="origin-tz">e.g. UTC+09:00</div>
      </div>
    </div>




    <!-- ── DESTINATIONS ── -->
    <div class="dest-col" id="dest-col">
      <div class="add-slot" id="add-slot">
        <div class="add-label">＋ &nbsp; Add destination</div>
      </div>
    </div>

  </div><!-- /.layout -->

</div><!-- /.wrap -->

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function norm(s){
  return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function utcLabel(tz){
  try {
    var now=new Date(), utc=new Date(now.toLocaleString("en-US",{timeZone:"UTC"})),
        loc=new Date(now.toLocaleString("en-US",{timeZone:tz}));
    var d=(loc-utc)/60000, h=Math.floor(Math.abs(d)/60), m=Math.abs(d)%60;
    return "UTC"+(d>=0?"+":"−")+String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
  } catch(e){ return "UTC"; }
}

function wallToUTC(year,month,day,h,m,tz){
  var guess=new Date(Date.UTC(year,month-1,day,h,m,0)), p={};
  new Intl.DateTimeFormat("en-US",{timeZone:tz,year:"numeric",month:"numeric",day:"numeric",
    hour:"numeric",minute:"numeric",second:"numeric",hour12:false
  }).formatToParts(guess).forEach(function(x){p[x.type]=x.value;});
  var ph=+p.hour; if(ph===24)ph=0;
  var wall=new Date(Date.UTC(+p.year,+p.month-1,+p.day,ph,+p.minute,+p.second));
  return new Date(guess.getTime()+(guess.getTime()-wall.getTime()));
}

/* Score a city match against query (higher = better) */
function scoreCity(city, q){
  var cn=norm(city.c), nn=norm(city.n), full=cn+", "+nn;
  var base=0;
  if(cn===q||full===q)          base=100;
  else if(cn.startsWith(q))     base=80;
  else if(full.startsWith(q))   base=70;
  else if(cn.includes(q))       base=50;
  else if(nn.startsWith(q))     base=40;
  else if(nn.includes(q))       base=20;
  if(base===0) return 0;
  // Tiebreaker: reward closer matches (query covers more of city name)
  // e.g. 'lon' vs 'London'(6) = 0.50, vs 'Long Beach'(10) = 0.30 → London wins
  var ratio = q.length / cn.length;
  return base + ratio;
}

function searchCities(q){
  if(!q) return CITIES.slice(0,16);
  var alias = ALIASES[norm(q)];
  var nq = norm(alias||q);
  var scored = [];
  CITIES.forEach(function(c,idx){
    var s = scoreCity(c, nq);
    if(s>0) scored.push({city:c, score:s, idx:idx});
  });
  // Sort by score desc, then by original array index asc (earlier = more prominent)
  scored.sort(function(a,b){
    if(b.score !== a.score) return b.score - a.score;
    return a.idx - b.idx;
  });
  return scored.slice(0,14).map(function(x){return x.city;});
}

/* Highlight matched substring in display */
function highlight(str, q){
  if(!q) return str;
  var nq=norm(q), ns=norm(str);
  var i=ns.indexOf(nq);
  if(i<0) return str;
  return str.slice(0,i)+'<span class="dhl">'+str.slice(i,i+q.length)+'</span>'+str.slice(i+q.length);
}

/* ═══════════════════════════════════════════════
   DROPDOWN
═══════════════════════════════════════════════ */
function makeDropdown(inp, drop, onSelect){
  var hiIdx=-1, picking=false;
  if(!drop.id) drop.id="drop-"+(++_dropId);
  inp.setAttribute("role","combobox");
  inp.setAttribute("aria-autocomplete","list");
  inp.setAttribute("aria-haspopup","listbox");
  inp.setAttribute("aria-expanded","false");
  inp.setAttribute("aria-controls",drop.id);
  drop.setAttribute("role","listbox");

  function rows(){ return drop.querySelectorAll(".drow"); }

  function setHi(i){
    rows().forEach(function(r){r.classList.remove("hi");r.setAttribute("aria-selected","false");});
    var all=rows();
    if(i>=0&&i<all.length){
      all[i].classList.add("hi");
      all[i].setAttribute("aria-selected","true");
      all[i].scrollIntoView({block:"nearest"});
      inp.setAttribute("aria-activedescendant",all[i].id);
    } else {
      inp.removeAttribute("aria-activedescendant");
    }
    hiIdx=i;
  }

  function showList(q){
    var list=searchCities(q);
    drop.innerHTML="";
    list.forEach(function(city,idx){
      var row=document.createElement("div");
      row.className="drow"; row.id=drop.id+"-"+idx;
      row.setAttribute("role","option"); row.setAttribute("aria-selected","false");
      var label=highlight(city.c+", "+city.n, q);
      row.innerHTML="<span>"+label+"</span><span class='dtz'>"+utcLabel(city.t)+"</span>";
      row.addEventListener("mousedown",function(){picking=true;});
      row.addEventListener("mouseup",  function(){picking=false;commit(city);});
      drop.appendChild(row);
    });
    drop.classList.add("open");
    inp.setAttribute("aria-expanded","true");
    hiIdx=-1;
  }

  function closeList(){
    drop.classList.remove("open");
    inp.setAttribute("aria-expanded","false");
    inp.removeAttribute("aria-activedescendant");
    hiIdx=-1;
  }

  function commit(city){
    inp.value=city.c+", "+city.n;
    closeList();
    onSelect(city);
  }

  inp.addEventListener("focus",  function(){ if(inp.value.trim()) showList(inp.value); });
  inp.addEventListener("input",  function(){ showList(inp.value); });
  inp.addEventListener("blur",   function(){ if(picking)return; closeList(); });
  inp.addEventListener("keydown",function(e){
    var all=rows();
    if(e.key==="ArrowDown"){ e.preventDefault(); setHi(Math.min(hiIdx+1,all.length-1)); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); setHi(Math.max(hiIdx-1,0)); }
    else if(e.key==="Enter"){
      e.preventDefault();
      if(hiIdx>=0&&all[hiIdx]){ all[hiIdx].dispatchEvent(new MouseEvent("mousedown")); all[hiIdx].dispatchEvent(new MouseEvent("mouseup")); }
      else { var m=searchCities(inp.value)[0]; if(m) commit(m); }
    } else if(e.key==="Escape"){ closeList(); inp.blur(); }
  });
  return commit;
}

  var v=inp.value; // "YYYY-MM-DD"
  if(!v){
    disp.textContent="e.g. Mar 1, 2026";
    disp.classList.remove("has-value");
  } else {
    var parts=v.split("-");
    var d=new Date(+parts[0], +parts[1]-1, +parts[2]);
    disp.textContent=d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    disp.classList.add("has-value");

function syncTimeDisplay(){
  var inp=document.getElementById("in-time");
  var disp=document.getElementById("time-display");
  if(!inp||!disp) return;
  var v=inp.value; // "HH:MM"
  if(!v){
    disp.textContent= fromFmt===24 ? "e.g. 09:00" : "e.g. 09:00 AM";
    disp.classList.remove("has-value");
  } else {
    var parts=v.split(":");
    var h=parseInt(parts[0],10), m=parts[1];
    if(fromFmt===24){
      disp.textContent=String(h).padStart(2,"0")+":"+m;
    } else {
      var ampm=h>=12?"PM":"AM";
      var h12=h%12||12;
      disp.textContent=h12+":"+m+" "+ampm;
    }
    disp.classList.add("has-value");
  }
}

function syncEmpty(){
  ["in-date"].forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.classList.toggle("empty", !el.value);
  });
}

/* ── DATE PICKER CONTROL ── */
(function(){
  var wrap  = document.querySelector(".date-wrap");
  var inp   = document.getElementById("in-date");
  var disp  = document.getElementById("date-display");
  if(!wrap||!inp||!disp) return;

  // clicking the display div opens the native picker
  disp.style.pointerEvents = "auto";
  disp.style.cursor = "pointer";
  disp.addEventListener("click", function(){
    inp.classList.add("picking");
    inp.focus();
    try{ inp.showPicker(); }catch(e){}
  });

  // as soon as a date is chosen — snap back to display immediately
  inp.addEventListener("change", function(){
    inp.classList.remove("picking");
    inp.blur();
    syncDateDisplay();
    clearAll(); convertAll(true); saveState();
  });

  // also hide if user clicks away without picking
  inp.addEventListener("blur", function(){
    inp.classList.remove("picking");
  });
})();

/* origin format toggle */
(function(){
  var b12=document.getElementById("o-btn12");
  var b24=document.getElementById("o-btn24");
  if(!b12||!b24) return;
  b12.addEventListener("click",function(){
    fromFmt=12;
    b12.classList.add("on"); b12.setAttribute("aria-pressed","true");
    b24.classList.remove("on"); b24.setAttribute("aria-pressed","false");
    syncTimeDisplay(); saveState();
  });
  b24.addEventListener("click",function(){
    fromFmt=24;
    b24.classList.add("on"); b24.setAttribute("aria-pressed","true");
    b12.classList.remove("on"); b12.setAttribute("aria-pressed","false");
    syncTimeDisplay(); saveState();
  });
})();

/* time input listener */
document.getElementById("in-time").addEventListener("change", function(){
  syncTimeDisplay(); clearAll(); convertAll(true); saveState();
});
document.getElementById("in-time").addEventListener("input", syncTimeDisplay);

document.getElementById("now-btn").onclick=function(){
  var now=new Date();
  document.getElementById("in-date").value=now.toISOString().split("T")[0];
  document.getElementById("in-time").value=
    String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  clearAll(); convertAll(true); syncDateDisplay(); syncTimeDisplay(); saveState();
};

/* ═══════════════════════════════════════════════
   VALIDATION
═══════════════════════════════════════════════ */
var ERR_INPUT = {"err-city":"from-inp","err-date":"date-display","err-time":"time-display"};
function showErr(id,msg){
  var el=document.getElementById(id);
  if(el){ el.textContent=msg||el.textContent; el.classList.add("show"); }
  var inpId=ERR_INPUT[id];
  if(inpId){ var inp=document.getElementById(inpId); if(inp) inp.classList.add("invalid"); }
}
function clearErr(id){
  var el=document.getElementById(id);
  if(el) el.classList.remove("show");
  var inpId=ERR_INPUT[id];
  if(inpId){ var inp=document.getElementById(inpId); if(inp) inp.classList.remove("invalid"); }
}
function clearAll(){ ["err-city","err-date","err-time"].forEach(clearErr); }

function validateOrigin(strict){
  var ok=true;
  if(!fromTz||!document.getElementById("from-inp").value.trim()){
    showErr("err-city"); ok=false;
  }
  // Only show date/time errors in strict mode (user explicitly tried to convert)
  // or when the field was already touched
  var dateVal=document.getElementById("in-date").value;
  var timeVal=document.getElementById("in-time").value;
  if(strict){
    if(!dateVal){ showErr("err-date"); ok=false; }
    if(!timeVal){ showErr("err-time"); ok=false; }
  } else {
    // soft: only error if one is filled but not the other
    if(dateVal&&!timeVal){ showErr("err-time"); ok=false; }
    if(timeVal&&!dateVal){ showErr("err-date"); ok=false; }
    if(!dateVal||!timeVal) ok=false; // silently block conversion
  }
  return ok;
}

/* ═══════════════════════════════════════════════
   CONVERT
═══════════════════════════════════════════════ */
function getOrigin(){
  var ds=document.getElementById("in-date").value.split("-");
  return {
    year: parseInt(ds[0]), month:parseInt(ds[1]), day:parseInt(ds[2]),
    tv:   document.getElementById("in-time").value
  };
}

function convertCard(dest){
  var card=document.getElementById("card-"+dest.num);
  if(!card) return;
  function write(sel,val,live){
    var el=card.querySelector(sel); if(!el) return;
    el.textContent=val;
    if(live){ el.classList.add("live"); el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash"); }
    else { el.classList.remove("live","flash"); }
  }
  var o=getOrigin();
  if(!dest.tz||!o.year||!o.month||!o.day||!o.tv){
    write(".c-date","e.g. Mar 1, 2026",false);
    write(".c-time","e.g. 09:00",false);
    write(".c-tz",  "e.g. UTC+09:00",false); return;
  }
  var h=parseInt(o.tv.split(":")[0]), m=parseInt(o.tv.split(":")[1]);
  try {
    var utc=wallToUTC(o.year,o.month,o.day,h,m,fromTz), p={};
    // Always get date parts in 24h first
    new Intl.DateTimeFormat("en-US",{timeZone:dest.tz,year:"numeric",month:"short",day:"numeric",
      hour:"2-digit",minute:"2-digit",hour12:false
    }).formatToParts(utc).forEach(function(x){p[x.type]=x.value;});

    var ts;
    if(dest.fmt===12){
      // Separate 12h formatter to reliably get AM/PM
      var p12={};
      new Intl.DateTimeFormat("en-US",{timeZone:dest.tz,
        hour:"numeric",minute:"2-digit",hour12:true
      }).formatToParts(utc).forEach(function(x){p12[x.type]=x.value;});
      ts = p12.hour+":"+p12.minute+" "+(p12.dayPeriod||"");
    } else {
      ts = p.hour+":"+p.minute;
    }
    var dateStr=p.month+" "+p.day+", "+p.year;
    write(".c-date", dateStr,          true);
    write(".c-time", ts,               true);
    write(".c-tz",   utcLabel(dest.tz),true);
  } catch(e){
    write(".c-date","e.g. Mar 1, 2026",false);
    write(".c-time","e.g. 09:00",false);
    write(".c-tz",  "e.g. UTC+09:00",false);
  }
}

function convertAll(strict){
  if(!validateOrigin(strict)) return;
  clearAll();
  dests.forEach(convertCard);
  // flash origin display boxes to signal successful conversion
  ["date-display","time-display","origin-tz"].forEach(function(id){
    var el=document.getElementById(id);
    if(!el||!el.classList.contains("has-value")&&id!=="origin-tz") return;
    el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
  });
}



function buildState(){
  return {
    cityName: document.getElementById("from-inp").value,
    tz:       fromTz,
    fmt:      fromFmt,
    date:     document.getElementById("in-date").value,
    time:     document.getElementById("in-time").value,
    dests:    dests.map(function(d){
      var card=document.getElementById("card-"+d.num);
      var city=card?card.querySelector(".c-city-inp").value:"";
      return {tz:d.tz, fmt:d.fmt, cityName:city, permanent:d.permanent};
    })
  };
}

function saveState(){
  try{ localStorage.setItem(STORAGE,JSON.stringify(buildState())); }catch(e){}
}

function loadState(){
  try{ var r=localStorage.getItem(STORAGE); return r?JSON.parse(r):null; }catch(e){ return null; }
}


/* ═══════════════════════════════════════════════
   CREATE CARD
═══════════════════════════════════════════════ */
function createCard(saved, permanent){
  var num=nextNum++;
  var dest={num:num, tz:saved?saved.tz:null, fmt:saved?saved.fmt:24, permanent:!!permanent};
  dests.push(dest);

  var card=document.createElement("div");
  card.className="dest-card"; card.id="card-"+num;
  var dropId="drop-d-"+num;

  var actionBtns= permanent ? '' :
    '<div class="card-actions">'+
    '<button class="remove-btn" aria-label="Remove destination '+num+'">remove</button>'+
    '</div>';

  card.innerHTML=
    actionBtns+
    '<div class="ptag"><span class="pdot pdot-red"></span>Destination '+num+'</div>'+

    '<div class="fld">'+
      '<label class="flabel" for="ci-'+num+'">City</label>'+
      '<div class="cwrap">'+
        '<input type="text" id="ci-'+num+'" class="c-city-inp"'+
          ' placeholder="e.g. Kobe, London, Dubai\u2026" autocomplete="off"'+
          ' role="combobox" aria-autocomplete="list"'+
          ' aria-expanded="false" aria-controls="'+dropId+'"'+
          ' aria-haspopup="listbox">'+
        '<div class="drop c-city-drop" id="'+dropId+'" role="listbox" aria-label="City suggestions"></div>'+
      '</div>'+
    '</div>'+

    '<div class="fld">'+
      '<label class="flabel">Date</label>'+
      '<div class="outbox c-date" aria-live="polite">e.g. Mar 1, 2026</div>'+
    '</div>'+

    '<div class="fld">'+
      '<div class="dt-row">'+
        '<div>'+
          '<label class="flabel">Time</label>'+
          '<div class="outbox c-time" aria-live="polite">e.g. 09:00</div>'+
        '</div>'+
        '<div class="now-cell">'+
          '<div class="tog" role="group" aria-label="Time format">'+
            '<button class="tb'+(dest.fmt===12?' on':'')+' c-btn12" aria-pressed="'+(dest.fmt===12)+'">12h</button>'+
            '<button class="tb'+(dest.fmt===24?' on':'')+' c-btn24" aria-pressed="'+(dest.fmt===24)+'">24h</button>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    '<div class="fld">'+
      '<label class="flabel">Timezone (UTC/GMT)</label>'+
      '<div class="outbox c-tz" aria-live="polite">e.g. UTC+09:00</div>'+
    '</div>';

  var col=document.getElementById("dest-col");
  var slot=document.getElementById("add-slot");
  col.insertBefore(card,slot);
  updateDestLabels();

  /* dropdown */
  var inp=card.querySelector(".c-city-inp"), drop=card.querySelector(".c-city-drop");
  makeDropdown(inp,drop,function(city){
    dest.tz=city.t; convertCard(dest); saveState();
  });
  if(saved&&saved.cityName) inp.value=saved.cityName;

  /* format toggle */
  var b24=card.querySelector(".c-btn24"), b12=card.querySelector(".c-btn12");
  b24.addEventListener("click",function(){
    dest.fmt=24; b24.classList.add("on"); b24.setAttribute("aria-pressed","true");
    b12.classList.remove("on"); b12.setAttribute("aria-pressed","false");
    convertCard(dest); saveState();
  });
  b12.addEventListener("click",function(){
    dest.fmt=12; b12.classList.add("on"); b12.setAttribute("aria-pressed","true");
    b24.classList.remove("on"); b24.setAttribute("aria-pressed","false");
    convertCard(dest); saveState();
  });


  /* remove button */
  if(!permanent){
    card.querySelector(".remove-btn").addEventListener("click",function(){
      col.removeChild(card);
      dests=dests.filter(function(d){return d.num!==num;});
      updateDestLabels();
      saveState();
    });
  }

  if(!saved) { /* no auto-focus */ }
  return dest;
}

/* ═══════════════════════════════════════════════
   ADD SLOT
═══════════════════════════════════════════════ */
document.getElementById("add-slot").addEventListener("click",function(){
  createCard(null,false); saveState();
});

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
(function(){
  try{ localStorage.removeItem(STORAGE); }catch(e){}
  createCard(null, true);
  syncEmpty(); syncDateDisplay(); syncTimeDisplay();
})();
</script>
